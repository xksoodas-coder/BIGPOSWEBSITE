<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigWebStore - تسجيل دخول الزبون</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-circle"><span>BS</span></div>
            </div>
            <h1>تسجيل دخول الزبون</h1>
            <p class="login-subtitle">BigWebStore — وصول خاص</p>

            <form id="customerLoginForm" class="admin-form">
                <div class="form-group">
                    <label for="cUsername">اسم المستخدم</label>
                    <input type="text" id="cUsername" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="cPassword">كلمة المرور</label>
                    <input type="password" id="cPassword" autocomplete="current-password" required>
                </div>
                <div class="form-group">
                    <label for="cStoreId">رمز المتجر (Store ID)</label>
                    <input type="text" id="cStoreId" required>
                </div>
                <div class="login-error" id="customerLoginError" hidden></div>
                <button type="submit" class="primary-btn login-btn" id="loginSubmitBtn">دخول</button>
            </form>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const settings = BWS.getSettings();
            const root = document.documentElement;
            root.style.setProperty('--primary', settings.theme.primary);
            root.style.setProperty('--primary-dark', settings.theme.primaryDark);
            root.style.setProperty('--primary-light', settings.theme.primaryLight);

            if (BWS.getCustomerSession() && BWS.getSessionToken()) {
                window.location.href = 'index.html';
                return;
            }

            const form = document.getElementById('customerLoginForm');
            const errEl = document.getElementById('customerLoginError');
            const submitBtn = document.getElementById('loginSubmitBtn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errEl.hidden = true;
                submitBtn.disabled = true;
                submitBtn.textContent = 'جاري التحقق...';

                const username = document.getElementById('cUsername').value;
                const password = document.getElementById('cPassword').value;
                const storeId = document.getElementById('cStoreId').value;

                const result = await BWS.customerLogin(username, password, storeId);
                if (result.ok) {
                    window.location.href = 'index.html';
                } else {
                    errEl.hidden = false;
                    errEl.textContent = result.error;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'دخول';
                }
            });
        });
    </script>
</body>
</html>
